<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Secure Login System</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <div class="container">

        <h1>Secure Login System</h1>

        <input
            type="email"
            id="email"
            placeholder="Enter Email">

        <input
            type="password"
            id="password"
            placeholder="Enter Password">

        <button onclick="register()">

            Register

        </button>

        <button onclick="login()">

            Login

        </button>

        <div id="otpSection">

            <input
                type="text"
                id="otp"
                placeholder="Enter OTP">

            <button onclick="verifyOTP()">

                Verify OTP

            </button>

        </div>

        <button onclick="loadHistory()">

            Show Login History

        </button>

        <p id="message"></p>

        <table>

            <thead>

                <tr>

                    <th>Browser</th>
                    <th>OS</th>
                    <th>Device</th>
                    <th>IP</th>
                    <th>Time</th>

                </tr>

            </thead>

            <tbody id="historyTable">

            </tbody>

        </table>

    </div>

    <script src="script.js"></script>

</body>

</html>
